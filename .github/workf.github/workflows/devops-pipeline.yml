name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main
      - feature/*
  pull_request:
    branches:
      - main

jobs:

# -------------------------
# 1 BUILD STAGE
# -------------------------

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Build Application
        run: echo "Application build successful"

# -------------------------
# 2 TEST STAGE
# -------------------------

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Unit Tests
        run: |
          echo "Running tests..."
          echo "Tests passed"

# -------------------------
# 3 CODE QUALITY STAGE
# -------------------------

  quality:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Code Linting
        run: |
          pip install flake8
          flake8 .

# -------------------------
# 4 DOCKER BUILD
# -------------------------

  docker-build:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t devops-learning-project .

# -------------------------
# 5 DEPLOY STAGE
# -------------------------

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Deploy Application
        run: |
          echo "Deploying application..."

# -------------------------
# 6 UI TEST / SMOKE TEST
# -------------------------

  ui-test:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Run UI Tests
        run: |
          echo "Running UI Tests"
          echo "Application is working"
